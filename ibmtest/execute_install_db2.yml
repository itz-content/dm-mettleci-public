---
- name: Execute Standalone Db2 Community Edition Setup
  hosts: localhost
  become: true
  vars:
    # Points exactly to where the transfer playbook unpacked it
    db2_extracted_path: "/opt/IBM/InformationServer/db2_extracted/server_dec"

  tasks:
    - name: 1. Ensure OS prerequisite libraries are present for RHEL 9
      ansible.builtin.dnf:
        name:
          - libaio
          - glibc
          - libgcc
          - libstdc++
          - pam
          - numactl-libs
        state: present

    - name: 2. Template the silent response file with the injected password
      ansible.builtin.template:
        src: "./templates/db2_server.rsp.j2"
        dest: "/tmp/db2_server.rsp"
        mode: '0644'

    - name: 2a. Temporarily set SELinux to Permissive for Db2
      ansible.builtin.shell: "setenforce 0"
      failed_when: false

    - name: 2b. Temporarily halt fapolicyd for Db2
      ansible.builtin.systemd:
        name: fapolicyd
        state: stopped
      failed_when: false

    - name: 3. Execute Db2 silent installation natively
      ansible.builtin.command:
        # The Linux kernel will kill this command and return exit code 124 if it hits 20 minutes
        cmd: "./db2setup -r /tmp/db2_server.rsp -l /tmp/db2_install.log"
        chdir: "{{ db2_extracted_path }}"
      register: db2_install_result
      # Background the task to prevent SSH network drops. Max time: 20 minutes (1200 seconds).
      async: 1200
      poll: 30
      
      # Explicitly allow 0 (Perfect) and 1 (Warnings)
      # Any other code will correctly halt the playbook immediately
      failed_when: db2_install_result.rc not in [0, 1]
      
    - name: 3a. Force Db2 internal registry to use TCP/IP
      ansible.builtin.shell: |
        source ~/sqllib/db2profile
        db2set DB2COMM=TCPIP
      args:
        executable: /bin/bash
      become: yes
      become_user: db2inst1

    - name: 3b. Add Db2 service port mapping to /etc/services
      ansible.builtin.lineinfile:
        path: /etc/services
        regexp: '^db2c_db2inst1'
        line: "db2c_db2inst1   50000/tcp"
        state: present

    - name: 3c. Update Db2 SVCENAME to use the mapped text string
      ansible.builtin.shell: |
        source ~/sqllib/db2profile
        db2 update dbm cfg using SVCENAME db2c_db2inst1
      args:
        executable: /bin/bash
      become: yes
      become_user: db2inst1
    
    - name: 3d. Drop and reconnect SSH to clear NSS Cache and read /etc/services
      ansible.builtin.meta: reset_connection

    - name: 3e. Bounce the Db2 engine to bind the network port
      ansible.builtin.shell: |
        source ~/sqllib/db2profile
        db2stop force || true
        db2start
      args:
        executable: /bin/bash
      become: yes
      become_user: db2inst1
      register: db2_bounce
      failed_when: db2_bounce.rc != 0 and 'SQL1026N' not in db2_bounce.stdout

    - name: 4a. Restore fapolicyd service post-installation
      ansible.builtin.systemd:
        name: fapolicyd
        state: started
      failed_when: false

    - name: 4b. Restore Enforcing SELinux State
      ansible.builtin.shell: "setenforce 1"
      failed_when: false

    - name: 5. Verify Db2 engine is listening on port 50000
      ansible.builtin.wait_for:
        port: 50000
        delay: 5
        timeout: 120
        msg: "Db2 instance failed to stand up and open port 50000."

    