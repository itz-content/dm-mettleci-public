---
- name: Execute IBM Information Server 11.7.1.6 Silent Install
  hosts: techzone_servers
  become: yes
  gather_facts: yes

  vars:
    installer_path: "/mnt/second/IBM/InfoSphere/is-suite"
    response_file_local: "./templates/responsems.txt.j2"
    response_file_remote: "/tmp/responsems.txt"
    password_file_remote: "/tmp/password.txt"
    ibm_password: "IBMiis@117$1!6"

  tasks:

    - name: 0. Terminate any stuck IBM processes
      # We use 'shell' with a trailing 'true' to ensure a success code
      # and 'failed_when: false' as a double-guard.
      shell: |
        pkill -9 -f is-suite || true
        pkill -9 -f setup || true
        pkill -9 -u itzuser java || true
        pkill -f "sshd: \[accepted\]" || true
        pkill -f "sshd: \[net\]" || true
      failed_when: false
      ignore_errors: yes

    - name: 0.1. Remove lock files and temp logs
      # Using the 'file' module is much cleaner than 'rm -rf'
      file:
        path: "{{ item }}"
        state: absent
      with_items:
        - /tmp/IBM_Information_Server_Install_Lock
        - /tmp/is-suite
        - /tmp/ibm_is_logs
        - /usr/ibm/common/acsi/logs
        - /tmp/is_home
        - /tmp/is_temp

    - name: 1. Ensure RHEL 9 Compatibility Libraries are Present
      dnf:
        name:
          - libnsl
          - libxcrypt-compat
        state : present

    - name: 1.5. Ensure Local Hostname is in /etc/hosts (Prevents IBM Hang)
      lineinfile:
        path: /etc/hosts
        regexp: '^127.0.0.1'
        line: "127.0.0.1 {{ ansible_hostname }} localhost localhost.localdomain"
        state: present
    
    - name: 2. Create InfoSphere Console Admin (isadmin)
      user:
        name: isadmin
        groups: dstage,db2iadm1
        append: yes
        state: present

    - name: 3. Copy Response File to VM
      template:
        src: "{{ response_file_local }}"
        dest: "{{ response_file_remote }}"
        owner: root
        group: root
        mode: '0644'

    - name: 4. Run the IBM Installer (Silent Mode)
      # This task will take 45-90 minutes depending on DB2/WebSphere setup
      shell: |
        umask  022
        ./setup -rsp {{ response_file_remote }} -verbose -force
      args:
        chdir: "{{ installer_path }}"
      environment:
        # Force a single locale to stop the CA/US "getLanguage" hang
        LC_ALL: "en_US.UTF-8"
        LANG: "en_US.UTF-8"
        # The JVM "No-Wait" flag
        _JAVA_OPTIONS: "-Djava.security.egd=file:/dev/./urandom -Duser.home=/tmp/is_home"
        IATEMPDIR: "/tmp/is_temp"
      register: install_output
      async: 7200  
      poll: 60     

    - name: 6. Show Installation Summary
      debug:
        var: install_output.stdout_lines