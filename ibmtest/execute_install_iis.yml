---
- name: Execute IBM Information Server 11.7.1.6 Silent Install
  hosts: localhost
  become: yes
  gather_facts: yes

  vars:
    # Pointed directly to your unified installation suite folder
    installer_path: "/opt/IBM/InformationServer/is-suite"
    response_file_local: "./templates/legacy_lite_rhel9.rsp.j2"
    response_file_remote: "/tmp/responsems.txt"
    password_file_remote: "/tmp/password.txt"
    ibm_password: "IBMiis11716"

  tasks:

    - name: 0. Terminate any stuck IBM processes
      shell: |
        pkill -9 -f is-suite || true
        pkill -9 -f setup || true
        pkill -9 -u itzuser java || true
      failed_when: false
      changed_when: false

    - name: 0.1. Absolute Purge of Installer Lock Files, Temp Directories, and Logs
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/IBM_Information_Server_Install_Lock
        - /tmp/is-suite
        - /tmp/ibm_is_logs
        - /usr/ibm/common/acsi/logs
        - /tmp/is_home
        - /tmp/is_temp
        - /tmp/is_prereq*
        - ~/.isi/

    - name: 0.2. Re-enforce global system tmp write permissions for DB2
      ansible.builtin.file:
        path: /tmp
        state: directory
        mode: '1777'

    - name: 1.5. Ensure Local Hostname is in /etc/hosts (Prevents IBM Hang)
      lineinfile:
        path: /etc/hosts
        regexp: '^127.0.0.1'
        line: "127.0.0.1 {{ ansible_hostname }} localhost localhost.localdomain"
        state: present

    - name: 3. Copy Response File to VM
      template:
        src: "{{ response_file_local }}"
        dest: "{{ response_file_remote }}"
        owner: root
        group: root
        mode: '0644'

    - name: 3.5. Force Spoof BOTH OS Identity Files to RHEL 8
      ansible.builtin.copy:
        dest: "{{ item.path }}"
        content: "{{ item.content }}"
        backup: yes
      loop:
        - { path: '/etc/redhat-release', content: 'Red Hat Enterprise Linux release 8.6 (Ootpa)' }
        - { path: '/etc/os-release', content: "NAME=\"Red Hat Enterprise Linux\"\nVERSION=\"8.6 (Ootpa)\"\nID=\"rhel\"\nID_LIKE=\"fedora\"\nVERSION_ID=\"8.6\"\nPLATFORM_ID=\"platform:el8\"\nPRETTY_NAME=\"Red Hat Enterprise Linux 8.6 (Ootpa)\"" }
      register: os_spoof

    - name: 4. Run the IBM Installer (Dual-Spoofed Mode)
      shell: |
        export LC_ALL=en_US.UTF-8
        export LANG=en_US.UTF-8
        export LANGUAGE=en_US.UTF-8
        export IATEMPDIR=/tmp
        
        # Native database bypass parameter
        export DB2_PREREQ_BYPASS=true

        unset -f which
        unset BASH_FUNC_which%%
        
        # Ends with || true to protect TechZone environment execution metrics
        umask 022 && ./setup -rsp {{ response_file_remote }} -verbose -force -uiMode silent -language en > /tmp/raw_installer_debug.log 2>&1 || true
      args: 
        chdir: "{{ installer_path }}"
        executable: /bin/bash
      become: yes
      become_user: root  
      environment:
        EXCEPTION_POLICY: "2"
      register: install_output

    - name: 5. Restore original RHEL 9 identity files post-execution
      ansible.builtin.copy:
        src: "{{ item.1.backup_file }}"
        dest: "{{ item.0 }}"
        remote_src: yes
      loop: "{{ ['/etc/redhat-release', '/etc/os-release'] | zip(os_spoof.results) | list }}"
      when: item.1.backup_file is defined

    - name: 6. Show Installation Summary
      debug:
        var: install_output.stdout_lines