---
- name: Execute IBM Information Server 11.7.1.6 Silent Install (Pure RHEL 9 Native)
  hosts: localhost
  become: yes
  gather_facts: yes

  vars:
    installer_path: "/opt/IBM/InformationServer/is-suite"
    response_file_local: "./templates/legacy_lite_rhel9.rsp.j2"
    response_file_remote: "/tmp/responsems.txt"
    password_file_remote: "/tmp/password.txt"

  tasks:

    - name: 0. Terminate any stuck IBM processes
      shell: |
        pkill -9 -f is-suite || true
        pkill -9 -f setup || true
        pkill -9 -u itzuser java || true
      failed_when: false
      changed_when: false

    - name: 0.1. Absolute Purge of Installer Lock Files, Temp Directories, and Logs
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/IBM_Information_Server_Install_Lock
        - /tmp/is-suite
        - /tmp/ibm_is_logs
        - /usr/ibm/common/acsi/logs
        - /tmp/is_home
        - /tmp/is_temp
        - /tmp/is_prereq*
        - ~/.isi/

    - name: 0.2. Re-enforce global system tmp write permissions for DB2
      ansible.builtin.file:
        path: /tmp
        state: directory
        mode: '1777'

    - name: 1.5. Ensure Local Hostname is in /etc/hosts (Prevents IBM Hang)
      lineinfile:
        path: /etc/hosts
        regexp: '^127.0.0.1'
        line: "127.0.0.1 {{ ansible_hostname }} localhost localhost.localdomain"
        state: present

    - name: 2a. Temporarily set SELinux to Permissive for Install Verification
      ansible.builtin.shell: "setenforce 0"
      failed_when: false

    - name: 2b. Temporarily halt fapolicyd to clear silent background binary blocks
      ansible.builtin.systemd:
        name: fapolicyd
        state: stopped
      failed_when: false

    - name: 3. Copy Response File to VM
      template:
        src: "{{ response_file_local }}"
        dest: "{{ response_file_remote }}"
        owner: root
        group: root
        mode: '0644'

    - name: 4. Run the IBM Installer (Native RHEL 9 Environment Bypass Mode)
      shell: |
        export LC_ALL=en_US.UTF-8
        export LANG=en_US.UTF-8
        export LANGUAGE=en_US.UTF-8
        
        # Point the installer temp directory to a safe, high-capacity path
        mkdir -p /opt/IBM/is_install_tmp
        export IATEMPDIR=/opt/IBM/is_install_tmp
        
        unset -f which
        unset BASH_FUNC_which%%
        
        # Executing silently without the '|| true' mask to ensure Ansible catches fatal errors
        umask 022 && ./setup -rsp {{ response_file_remote }} -verbose -force -uiMode silent -language en > /tmp/raw_installer_debug.log 2>&1
      args: 
        chdir: "{{ installer_path }}"
        executable: /bin/bash
      become: yes
      become_user: root  
      environment:
        EXCEPTION_POLICY: "2"
      register: install_output
      # Accept 0 (Perfect), 2 (Success with Warnings), or 3 (Success with non-fatal errors)
      failed_when: install_output.rc not in [0, 2, 3]

    - name: 5a. Restore active fapolicyd service post-installation
      ansible.builtin.systemd:
        name: fapolicyd
        state: started
      failed_when: false

    - name: 5b. Restore Enforcing SELinux State
      ansible.builtin.shell: "setenforce 1"
      failed_when: false

    - name: 6. Show Installation Summary
      debug:
        msg: "Information Server wrapper completed with exit code {{ install_output.rc }}. Check /tmp/raw_installer_debug.log for details."