---
- name: Transfer and Extract IBM 11.7.1.6 Binaries
  hosts: techzone_servers
  become: yes
  gather_facts: no

  vars:
    local_binary_path: "./IS_V11716"
    binary_name: "IS_V11716_Linux_x86_multi.tar.gz"
    remote_staging_path: "/mnt/second/IBM/InfoSphere"

  tasks:
    - name: 1. Upload and Extract IBM Installer (This will take 10-20 mins)
      unarchive:
        src: "{{ local_binary_path }}/{{ binary_name }}"
        dest: "{{ remote_staging_path }}"
        owner: itzuser
        group: itzuser
        mode: '0775'
        remote_src: no
      register: transfer_result

    - name: 2. Fix Permissions on Extracted Files
      file:
        path: "{{ remote_staging_path }}"
        owner: itzuser
        group: itzuser
        recurse: yes
        state: directory

    - name: 3. Verify Installer 'setup' File Exists
      stat:
        path: "{{ remote_staging_path }}/is-suite/setup"
      register: setup_file

    - name: 4. Report Success
      debug:
        msg: "Installer is ready at {{ remote_staging_path }}/is-suite/setup"
      when: setup_file.stat.exists