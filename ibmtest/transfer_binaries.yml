---
- name: Transfer and Extract IBM 11.7.1.6 Binaries
  hosts: techzone_servers
  become: yes
  gather_facts: no

  vars:
    local_binary_path: "./IS_V11716"
    remote_staging_path: "/mnt/second/IBM/InfoSphere"
    # Individual file names
    main_tar: "IS_V11716_Linux_x86_multi.tar.gz"
    spec_zip: "IS_V11716.bundle_spec_file_mult.zip"

  tasks:
    - name: 1. Ensure Staging Directory Exists
      file:
        path: "{{ remote_staging_path }}"
        state: directory
        owner: itzuser
        group: itzuser
        mode: '0775'

    - name: 2. Extract Main Tarball (Creates is-suite folder)
      unarchive:
        src: "{{ local_binary_path }}/{{ main_tar }}"
        dest: "{{ remote_staging_path }}"
        owner: itzuser
        group: itzuser
        remote_src: no
      register: tar_result

    - name: 3. Extract Bundle Spec Zip (Into the is-suite folder)
      unarchive:
        src: "{{ local_binary_path }}/{{ spec_zip }}"
        # This puts image.properties directly where the installer looks
        dest: "{{ remote_staging_path }}/is-suite"
        owner: itzuser
        group: itzuser
        remote_src: no

    - name: 4. Verify Critical Files
      stat:
        path: "{{ remote_staging_path }}/is-suite/{{ item }}"
      loop:
        - setup
        - image.properties
      register: file_check

    - name: 5. Final Confirmation
      debug:
        msg: "All components present in /mnt/second/IBM/InfoSphere/is-suite/"
      when: file_check.results | map(attribute='stat.exists') | all