---
- name: Transfer and Extract IBM 11.7.1.6 Binaries
  hosts: techzone_servers
  become: yes
  gather_facts: no

  vars:
    # Path relative to where you run the playbook on your Mac
    local_binary_path: "./IS_V11716"
    remote_staging_path: "/mnt/second/IBM/InfoSphere"
    binaries:
      - "IS_V11716_Linux_x86_multi.tar.gz"
      - "IS_V11716.bundle_spec_file_mult.zip"

  tasks:
    - name: 1. Upload and Extract IBM Installer (This takes time!)
      unarchive:
        src: "{{ local_binary_path }}/{{ binary_name }}"
        dest: "{{ remote_staging_path }}"
        owner: itzuser
        group: itzuser
        mode: '0775'
        remote_src: no
      register: transfer_result

    - name: 2. Fix Permissions for itzuser
      file:
        path: "{{ remote_staging_path }}"
        owner: itzuser
        group: itzuser
        recurse: yes
        state: directory

    - name: 3. Verify Installer 'setup' File Presence
      stat:
        path: "{{ remote_staging_path }}/is-suite/setup"
      register: setup_file

    - name: 4. Final Confirmation
      debug:
        msg: "Ready to install! Execute: {{ remote_staging_path }}/is-suite/setup"
      when: setup_file.stat.exists
