---
- name: Tune RHEL 9 for IBM Information Server 11.7
  hosts: localhost
  become: yes
  gather_facts: no

  tasks:
    - name: 1. Configure Linux User Limits (ulimits) via Blockinfile
      blockinfile:
        path: /etc/security/limits.conf
        marker: "# {mark} ANSIBLE MANAGED IBM SERVICE USER LIMITS"
        block: |
          # Installer User
          itzuser          -       nofile          65536
          itzuser          -       nproc           16384
          itzuser          -       fsize           unlimited
          itzuser          -       stack           10240

          # DataStage Engine User
          dsadm            -       nofile          65536
          dsadm            -       nproc           16384

          # DB2 Instance Owner
          db2inst1         -       nofile          65536
          db2inst1         -       nproc           16384
          db2inst1         -       data            unlimited

          # DB2 Fenced User
          db2fenc1         -       nofile          65536

          # Metadata User
          xmeta            -       nofile          65536

    - name: 2a. Write Kernel Parameters to Configuration File
      blockinfile:
        path: /etc/sysctl.d/99-ibm-tuning.conf
        create: yes
        mode: '0644'
        marker: "# {mark} ANSIBLE MANAGED IBM KERNEL SETTINGS"
        block: |
          # Shared Memory scaled perfectly for a 32GB RAM footprint (allocating 16GB)
          kernel.shmmax = 17179869184
          kernel.shmall = 4194304
          
          # Semaphores tuned explicitly to satisfy DB2 minimum thresholds (SEMMNI=1024)
          kernel.sem = 250 256000 32 1024
          
          # Messaging thresholds and virtual memory allocations
          kernel.msgmax = 65536
          kernel.msgmnb = 65536
          vm.swappiness = 10
          vm.max_map_count = 262144

    - name: 2b. Reload Kernel Parameters Instantly
      shell: "sysctl -p /etc/sysctl.d/99-ibm-tuning.conf"

    - name: 3. Force Global umask for IBM stability
      lineinfile:
        path: /etc/profile
        line: "umask 022"
        state: present