---
- name: Tune RHEL 9 for IBM Information Server 11.7
  hosts: techzone_servers
  become: yes
  gather_facts: no

  tasks:
    - name: 1. Configure Linux User Limits (ulimits) via Blockinfile
      blockinfile:
        path: /etc/security/limits.conf
        marker: "# {mark} ANSIBLE MANAGED IBM SERVICE USER LIMITS"
        block: |
          # Installer User
          itzuser          -       nofile          65536
          itzuser          -       nproc           16384
          itzuser          -       fsize           unlimited
          itzuser          -       stack           10240

          # DataStage Engine User
          dsadm            -       nofile          65536
          dsadm            -       nproc           16384

          # DB2 Instance Owner
          db2inst1         -       nofile          65536
          db2inst1         -       nproc           16384
          db2inst1         -       data            unlimited

          # DB2 Fenced User
          db2fenc1         -       nofile          65536

          # Metadata User
          xmeta            -       nofile          65536

    - name: 2. Configure Kernel Parameters (sysctl)
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        # Shared Memory (8GB example for 12GB+ RAM systems)
        - { name: 'kernel.shmmax', value: '8589934592' }
        - { name: 'kernel.shmall', value: '2097152' }
        # Semaphores
        - { name: 'kernel.sem', value: '250 32000 100 128' }
        # Message Queues
        - { name: 'kernel.msgmax', value: '65536' }
        - { name: 'kernel.msgmnb', value: '65536' }
        # Memory Management
        - { name: 'vm.swappiness', value: '10' }
        - { name: 'vm.max_map_count', value: '262144' }

    - name: 3. Verify itzuser Group Membership
      user:
        name: itzuser
        groups: dstage,db2iadm1,db2fadm1
        append: yes

    - name: 4. Force Global umask for IBM stability
      lineinfile:
        path: /etc/profile
        line: "umask 022"
        state: present
        