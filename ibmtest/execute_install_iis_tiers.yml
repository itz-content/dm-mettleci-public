---
- name: Execute IBM Information Server 11.7.1.6 Silent Install (Tiered RHEL 9 Native)
  hosts: localhost
  become: yes
  gather_facts: yes

  vars:
    installer_path: "/opt/IBM/InformationServer/is-suite"
    
    # Tiered Response Files (Templates)
    repo_file_local: "./templates/repo.rsp.j2"
    services_file_local: "./templates/services.rsp.j2"
    engine_file_local: "./templates/engine.rsp.j2"
    
    # Remote Execution Paths
    repo_file_remote: "/tmp/repo.rsp"
    services_file_remote: "/tmp/services.rsp"
    engine_file_remote: "/tmp/engine.rsp"

  tasks:

    - name: 0. Terminate any stuck IBM processes
      shell: |
        pkill -9 -f is-suite || true
        pkill -9 -f setup || true
        pkill -9 -u itzuser java || true
      failed_when: false
      changed_when: false

    - name: 0.1. Absolute Purge of Installer Lock Files, Temp Directories, and Logs
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/IBM_Information_Server_Install_Lock
        - /tmp/is-suite
        - /tmp/ibm_is_logs
        - /usr/ibm/common/acsi/logs
        - /tmp/is_home
        - /tmp/is_temp
        - /tmp/is_prereq*
        - ~/.isi/

    - name: 0.2. Re-enforce global system tmp write permissions for DB2
      ansible.builtin.file:
        path: /tmp
        state: directory
        mode: '1777'

    - name: 1.5. Ensure Public IP mapping in /etc/hosts (Prevents WebSphere Binding to Loopback)
      lineinfile:
        path: /etc/hosts
        regexp: '.*{{ ansible_hostname }}$'
        state: absent

    - name: 1.5.1. Add internal IP mapping to /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: "{{ ansible_all_ipv4_addresses | select('match', '^10\\.10\\.') | first }} {{ ansible_hostname }} {{ ansible_hostname }}.localdomain"
        state: present

    - name: 2a. Temporarily set SELinux to Permissive for Install Verification
      ansible.builtin.shell: "setenforce 0"
      failed_when: false

    - name: 2b. Temporarily halt fapolicyd to clear silent background binary blocks
      ansible.builtin.systemd:
        name: fapolicyd
        state: stopped
      failed_when: false

    - name: 3. Stage Tiered Response Files to VM
      template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: '0644'
      loop:
        - { src: "{{ repo_file_local }}", dest: "{{ repo_file_remote }}" }
        - { src: "{{ services_file_local }}", dest: "{{ services_file_remote }}" }
        - { src: "{{ engine_file_local }}", dest: "{{ engine_file_remote }}" }


    # ==========================================
    # TIER 1: REPOSITORY DEPLOYMENT & VALIDATION
    # ==========================================
    - name: 4a. Run IBM Installer - Repository Tier
      shell: |
        export LC_ALL=en_US.UTF-8
        export LANG=en_US.UTF-8
        export LANGUAGE=en_US.UTF-8
        mkdir -p /opt/IBM/is_install_tmp
        export IATEMPDIR=/opt/IBM/is_install_tmp
        unset -f which
        unset BASH_FUNC_which%%
        
        umask 022 && ./setup -rsp {{ repo_file_remote }} -verbose -force -uiMode silent -language en > /tmp/repo_debug.log 2>&1 </dev/null
      args: 
        chdir: "{{ installer_path }}"
        executable: /bin/bash
      become: yes
      become_user: root  
      environment:
        EXCEPTION_POLICY: "2"
      register: repo_install
      async: 7200
      poll: 60
      failed_when: repo_install.rc not in [0, 2, 3]

    - name: 4b. Validate Repository Tier (Verify xmeta schema exists)
      shell: '. ~/sqllib/db2profile && echo -e "connect to xmeta user xmeta using {{ ibm_password }}\nlist tables for schema xmeta" | db2'
      become: true
      become_user: db2inst1
      register: repo_validation
      failed_when: "'0 record(s) selected' in repo_validation.stdout or 'SQL1024N' in repo_validation.stdout or repo_validation.rc != 0"

    - name: Configure xmeta Transaction Logs
      ansible.builtin.shell: . ~/sqllib/db2profile && db2 update db cfg for xmeta using LOGFILSIZ 32768
      become: true
      become_user: db2inst1

    - name: Restart Db2 Instance to Apply Log Configuration
      ansible.builtin.shell: . ~/sqllib/db2profile && db2stop force && db2start
      become: true
      become_user: db2inst1

    # ==========================================
    # TIER 2: SERVICES DEPLOYMENT & VALIDATION
    # ==========================================
    - name: 5a. Run IBM Installer - Services Tier (WebSphere)
      shell: |
        export LC_ALL=en_US.UTF-8
        mkdir -p /opt/IBM/is_install_tmp
        export IATEMPDIR=/opt/IBM/is_install_tmp
        unset -f which
        unset BASH_FUNC_which%%
        
        umask 022 && ./setup -rsp {{ services_file_remote }} -verbose -force -uiMode silent -language en > /tmp/services_debug.log 2>&1 </dev/null
      args: 
        chdir: "{{ installer_path }}"
        executable: /bin/bash
      become: yes
      become_user: root  
      environment:
        EXCEPTION_POLICY: "2"
      register: services_install
      async: 14400
      poll: 60
      failed_when: 
        - services_install.rc is defined
        - services_install.rc not in [0, 2, 3]
    
    - name: 5b. Configure ODF Kafka Bootstrap Servers to port 59092
      shell: "/opt/IBM/InformationServer/ASBServer/bin/iisAdmin.sh -set -key com.ibm.iis.odf.kafka.bootstrap.servers -value localhost:59092"
      become: true
      become_user: root

    - name: 5c. Validate Services Tier (Verify WebSphere JVM is running)
      shell: "ps -ef | grep java | grep WebSphere"
      register: was_process_check
      failed_when: was_process_check.stdout == ""


    # ==========================================
    # TIER 3: ENGINE DEPLOYMENT & VALIDATION
    # ==========================================
    - name: 6a. Run IBM Installer - Engine Tier (DataStage)
      shell: |
        export LC_ALL=en_US.UTF-8
        mkdir -p /opt/IBM/is_install_tmp
        export IATEMPDIR=/opt/IBM/is_install_tmp
        unset -f which
        unset BASH_FUNC_which%%
        
        umask 022 && ./setup -rsp {{ engine_file_remote }} -verbose -force -uiMode silent -language en > /tmp/engine_debug.log 2>&1 </dev/null
      args: 
        chdir: "{{ installer_path }}"
        executable: /bin/bash
      become: yes
      become_user: root  
      environment:
        EXCEPTION_POLICY: "2"
      register: engine_install
      async: 7200
      poll: 60
      failed_when: engine_install.rc not in [0, 2, 3]

    - name: 6b. Validate Engine Tier (Verify RPC Daemon Listening on 31538)
      shell: "/usr/sbin/ss -tln | grep 31538"
      register: rpc_process_check
      failed_when: rpc_process_check.stdout == ""


    # ==========================================
    # POST-INSTALLATION: SECURITY RESTORATION
    # ==========================================
    - name: 7a. Restore active fapolicyd service post-installation
      ansible.builtin.systemd:
        name: fapolicyd
        state: started
      failed_when: false

    - name: 7b. Restore Enforcing SELinux State
      ansible.builtin.shell: "setenforce 1"
      failed_when: false

    - name: 8. Show Installation Summary
      debug:
        msg: "Tiered Installation Complete. Repo RC: {{ repo_install.rc }}, Services RC: {{ services_install.rc }}, Engine RC: {{ engine_install.rc }}. Check /tmp/ for tier-specific debug logs."