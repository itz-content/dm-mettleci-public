---
- name: Verify RHEL-to-Mac Connectivity
  hosts: techzone_servers
  gather_facts: no
  vars:
    # Update this with the IP you found in Step 2
    mac_ip: "100.64.0.6" 

  tasks:
    - name: 1. Test Web Server Reachability
      uri:
        url: "http://{{ mac_ip }}:8080"
        method: HEAD
        timeout: 10
      register: uri_check
      ignore_errors: yes

    - name: 2. Connection Diagnostics
      debug:
        msg: >
          {% if uri_check.status == 200 or uri_check.status == 301 %}
          SUCCESS: The VM can see your Mac. Start the transfer!
          {% else %}
          FAILED: The VM cannot reach your Mac. 
          Check if your Mac Firewall is on or if you need to use a VPN IP.
          {% endif %}