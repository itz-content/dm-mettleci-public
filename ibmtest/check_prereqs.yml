---
- name: IBM 11.7 Infrastructure and Prerequisite Check
  hosts: localhost
  become: yes
  gather_facts: yes

  tasks:
    - name: 1. Verify Operating System is RHEL
      assert:
        that:
          - ansible_distribution == "RedHat"
          - ansible_distribution_major_version == "9"
        fail_msg: "This playbook requires RHEL 9. Found {{ ansible_distribution }} {{ ansible_distribution_major_version }}"

    - name: 2a. Check if chkconfig is already registered on system
      ansible.builtin.command: rpm -q chkconfig
      register: chkconfig_check
      failed_when: false
      changed_when: false

    - name: 2b. Clear conflicting init.d directory marker if chkconfig is missing
      ansible.builtin.file:
        path: /etc/init.d
        state: absent
      when: chkconfig_check.rc != 0

    - name: 2c. Install Required Packages, Utilities, and Java 1.8
      yum:
        state: present
        name:
          - chkconfig        # Added: Resolves legacy script process monitoring hooks
          - net-tools        # Added: Restores 'netstat' required by validation tasks
          - java-1.8.0-openjdk
          - java-1.8.0-openjdk-devel
          - gtk2
          - libffi
          - libgcc
          - libstdc++
          - tar
          - unzip
          - libXp
          - libXft
          - libXtst
          - libXmu
          - bc
          - pam.i686
          - libnsl.i686
          - python3-pip
          - python3-boto3

    - name: 2d. Recreate empty init.d hierarchy context if it was cleared
      ansible.builtin.file:
        path: /etc/init.d
        state: directory
        mode: '0755'
        owner: root
        group: root
      when: chkconfig_check.rc != 0

    - name: 2e. Patch PAM configuration for IBM
      replace:
        path: /etc/pam.d/other
        regexp: 'pam_deny.so'
        replace: 'pam_unix.so'

    - name: 2f. Set file descriptor limits (ulimits) via Blockinfile
      blockinfile:
        path: /etc/security/limits.conf
        marker: "# {mark} ANSIBLE MANAGED IBM LIMITS"
        block: |
          * soft nofile 10240
          * hard nofile 10240

    - name: 3a. Locate Java 1.8 Binary Path
      shell: "find /usr/lib/jvm/java-1.8.0-openjdk* -name java | grep bin/java | head -n 1"
      args:
        executable: /bin/bash
      register: found_java_path
      changed_when: false

    - name: 3b. Set Java 1.8 as Default using Command Line
      shell: "alternatives --set java {{ found_java_path.stdout }}"
      when: found_java_path.stdout != ""   

    - name: 4. Final Java Verification
      shell: "java -version 2>&1"
      register: java_final
      changed_when: false

    - name: 5. Show Java Version
      debug:
        msg: "{{ java_final.stdout_lines[0] }}"
    
    - name: 6. Summary of Memory Facts
      debug:
        msg: "System has {{ ansible_memtotal_mb }} MB of RAM available for the install."

    - name: 7. Hardware Capacity Gatekeeper
      assert:
        that:
          - ansible_processor_vcpus >= 2
          - ansible_memtotal_mb >= 11600
        fail_msg: "UNSUPPORTED HARDWARE: IBM 11.7 requires 2+ Cores and 12GB+ RAM. Detected: {{ ansible_processor_vcpus }} Cores and {{ ansible_memtotal_mb }} MB RAM."
        success_msg: "Hardware check passed. Ready for IBM 11.7 installation."

    - name: 8a. Ensure IBM Parent Directory Exists
      file:
        path: /mnt/second/IBM
        state: directory
        owner: itzuser
        group: itzuser
        mode: '0775'

    - name: 8b. Ensure InfoSphere Subdirectory Exists
      file:
        path: /mnt/second/IBM/InformationServer
        state: directory
        owner: itzuser
        group: itzuser
        mode: '0775'
        recurse: yes

    - name: 8c. Create Home Parent Directory on Secondary Disk
      file:
        path: /mnt/second/home
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: 8d. Create IBM Service Groups
      group:
        name: "{{ item }}"
        state: present
      loop:
        - dstage      
        - db2iadm1    
        - faspgrp     
        - db2fadm1    

    - name: 8e. Create IBM Service Users on Secondary Disk
      user:
        name: "{{ item.name }}"
        group: "{{ item.group }}"
        # Static SHA-512 hash for "IBMiis11716" to bypass missing python-passlib libraries
        password: "$6$rounds=656000$vdR7M3Z2v8$R1gU3sXv8l8n8Zq9g7pYKEP9N3fS3fS0W8zK98xO8fA6eR7tY8uI9oO0pP1qQ2rR3sS4tT5uU6vV7wW8xX9yY."
        home: "/mnt/second/home/{{ item.name }}"
        shell: /bin/bash
        state: present
        create_home: yes
      loop:
        - { name: 'dsadm', group: 'dstage' }
        - { name: 'db2inst1', group: 'db2iadm1' }
        - { name: 'db2fenc1', group: 'db2fadm1' }
        - { name: 'xmeta', group: 'db2iadm1' }
        - { name: 'isadmin', group: 'dstage' }

    - name: 8f. Ensure itzuser is in the IBM groups
      user:
        name: itzuser
        groups: dstage,db2iadm1,db2fadm1
        append: yes

    - name: 8g. Create Global IBM Temp Directory
      file:
        path: /mnt/second/is_temp
        state: directory
        owner: itzuser
        group: itzuser
        mode: '1777'

    - name: 8h. Scrub interactive commands from IBM profiles
      lineinfile:
        path: "/mnt/second/home/{{ item }}/.bashrc"
        regexp: '^stty'
        state: absent
      loop: [ 'db2inst1', 'db2fenc1', 'dsadm' ]

    - name: 9. Verify Sufficient Disk Space on Secondary Mount
      assert:
        that:
          - item.mount == '/mnt/second' and (item.size_available > 60 * 1024 * 1024 * 1024)
        fail_msg: "INSUFFICIENT SPACE: /mnt/second needs at least 60GB for the IBM binaries."
        success_msg: "Secondary disk check passed. Found {{ (item.size_available / 1024 / 1024 / 1024) | round(2) }} GB free."
      loop: "{{ ansible_mounts }}"
      when: item.mount == '/mnt/second'