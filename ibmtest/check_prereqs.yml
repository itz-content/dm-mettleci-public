---
- name: IBM 11.7 Infrastructure and Prerequisite Check
  hosts: localhost
  become: yes
  gather_facts: yes

  tasks:
    - name: 1. Verify Operating System is RHEL
      ansible.builtin.assert:
        that:
          - ansible_distribution == "RedHat"
          - ansible_distribution_major_version == "9"
        fail_msg: "This playbook requires RHEL 9. Found {{ ansible_distribution }} {{ ansible_distribution_major_version }}"

    - name: 2a. Check if chkconfig is already registered on system
      ansible.builtin.command: rpm -q chkconfig
      register: chkconfig_check
      failed_when: false
      changed_when: false

    - name: 2b. Clear conflicting init.d directory marker if chkconfig is missing
      ansible.builtin.file:
        path: /etc/init.d
        state: absent
      when: chkconfig_check.rc != 0

    - name: 2c. Enforce System Utility Packages and Java 1.8 SDK Status
      ansible.builtin.dnf:
        state: present
        name:
          - chkconfig        
          - net-tools        
          - ed
          - util-linux
          - unzip
          - bc
          - java-1.8.0-openjdk-devel

    - name: 2d. Recreate empty init.d hierarchy context if it was cleared
      ansible.builtin.file:
        path: /etc/init.d
        state: directory
        mode: '0755'
        owner: root
        group: root
      when: chkconfig_check.rc != 0

    - name: 2e. Provide OpenSSL 1.0 Legacy Compatibility Layer Symlinks
      ansible.builtin.file:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        state: link
        force: yes
      loop:
        - { src: '/usr/lib64/libcrypto.so.3', dest: '/usr/lib64/libcrypto.so.10' }
        - { src: '/usr/lib64/libssl.so.3', dest: '/usr/lib64/libssl.so.10' }

    - name: 2f. Patch PAM configuration for IBM
      ansible.builtin.replace:
        path: /etc/pam.d/other
        regexp: 'pam_deny.so'
        replace: 'pam_unix.so'

    - name: 3a. Locate Java 1.8 Binary Path
      ansible.builtin.shell: "find /usr/lib/jvm/java-1.8.0-openjdk* -name java | grep bin/java | head -n 1"
      args:
        executable: /bin/bash
      register: found_java_path
      changed_when: false

    - name: 3b. Set Java 1.8 as Default using Command Line
      ansible.builtin.shell: "alternatives --set java {{ found_java_path.stdout }}"
      when: found_java_path.stdout != ""   

    - name: 4. Final Java Verification
      ansible.builtin.shell: "java -version 2>&1"
      register: java_final
      changed_when: false

    - name: 5. Show Java Version
      ansible.builtin.debug:
        msg: "{{ java_final.stdout_lines[0] }}"
    
    - name: 6. Summary of Memory Facts
      ansible.builtin.debug:
        msg: "System has {{ ansible_memtotal_mb }} MB of RAM available for the install."

    - name: 7. Hardware Capacity Gatekeeper
      ansible.builtin.assert:
        that:
          - ansible_processor_vcpus >= 2
          - ansible_memtotal_mb >= 11600
        fail_msg: "UNSUPPORTED HARDWARE: IBM 11.7 requires 2+ Cores and 12GB+ RAM. Detected: {{ ansible_processor_vcpus }} Cores and {{ ansible_memtotal_mb }} MB RAM."
        success_msg: "Hardware check passed. Ready for IBM 11.7 installation."

    - name: 8a. Create IBM Service Groups
      ansible.builtin.group:
        name: "{{ item }}"
        state: present
      loop:
        - dstage      
        - db2iadm1    
        - db2fadm1    

    - name: 8b. Create IBM Service Users (Standard Linux OS Paths)
      ansible.builtin.user:
        name: "{{ item.name }}"
        group: "{{ item.group }}"
        password: "{{ ibm_password | password_hash('sha512') }}"
        shell: /bin/bash
        state: present
        create_home: yes
      loop:
        - { name: 'dsadm', group: 'dstage' }
        - { name: 'db2inst1', group: 'db2iadm1' }
        - { name: 'db2fenc1', group: 'db2fadm1' }
        - { name: 'xmeta', group: 'db2iadm1' }
        - { name: 'dsodb', group: 'dstage'}

    - name: 8c. Ensure itzuser is in the IBM groups
      ansible.builtin.user:
        name: itzuser
        groups: dstage,db2iadm1,db2fadm1
        append: yes

    - name: 8d. Ensure Standard IBM Parent Directory Exists
      ansible.builtin.file:
        path: /opt/IBM
        state: directory
        owner: root
        group: dstage
        mode: '0777'

    - name: 8e. Ensure Standard InfoSphere Subdirectory Exists
      ansible.builtin.file:
        path: /opt/IBM/InformationServer
        state: directory
        owner: root
        group: dstage
        mode: '0777'
        recurse: yes

    - name: 8f. Ensure global system tmp has correct permissions for DB2
      ansible.builtin.file:
        path: /tmp
        state: directory
        mode: '1777'

    - name: 8g. Scrub interactive commands from IBM profiles
      ansible.builtin.lineinfile:
        path: "/home/{{ item }}/.bashrc"
        regexp: '^stty'
        state: absent
      loop: [ 'db2inst1', 'db2fenc1', 'dsadm' ]

    - name: 9. Verify Sufficient Disk Space on Root Mount
      ansible.builtin.assert:
        that:
          - item.mount == '/' and (item.size_available > 60 * 1024 * 1024 * 1024)
        fail_msg: "INSUFFICIENT SPACE: The root disk needs at least 60GB for the IBM binaries."
        success_msg: "Root disk capacity check passed. Found {{ (item.size_available / 1024 / 1024 / 1024) | round(2) }} GB free."
      loop: "{{ ansible_mounts }}"
      when: item.mount == '/'