---
- name: Transfer and Extract IBM 11.7.1.6 and Db2 Binaries from S3
  hosts: localhost
  become: yes
  gather_facts: yes

  vars:
    s3_bucket_name: "dm-mettleci-public"
    aws_endpoint_url: "https://s3.us.cloud-object-storage.appdomain.cloud"
    
    remote_staging_path: "/opt/IBM/InformationServer"
    
    main_tar: "binaries/IS_V11716_Linux_x86_multi.tar.gz"
    spec_zip: "binaries/IS_V11716.bundle_spec_file_mult.zip"
    # Added Db2 target (adjust the "binaries/" prefix if you uploaded it to the root bucket level)
    db2_tar: "binaries/v11.5.8_linuxx64_server_dec.tar.gz"

  tasks:
    - name: 1. Check if AWS CLI is installed
      shell: command -v aws
      register: aws_cli_check
      ignore_errors: yes
      changed_when: false

    - name: 2. Install AWS CLI on RHEL9 if missing
      shell: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip -q awscliv2.zip
        ./aws/install --update
        rm -rf awscliv2.zip ./aws
      args:
        chdir: /tmp
      when: aws_cli_check.rc != 0

    - name: 3. Ensure Clean Staging Directory Exists on Root Volume
      file:
        path: "{{ remote_staging_path }}"
        state: directory
        owner: root
        group: dstage
        mode: '0777'

    - name: 4. Copy Main Tarball using AWS CLI
      shell: >
        AWS_ACCESS_KEY_ID="{{ aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY="{{ aws_secret_access_key }}"
        /usr/local/bin/aws s3 cp s3://{{ s3_bucket_name }}/{{ main_tar }} {{ remote_staging_path }}/IS_V11716_Linux_x86_multi.tar.gz
        --endpoint-url {{ aws_endpoint_url }}
      no_log: true  

    - name: 4.1. Copy Db2 Tarball using AWS CLI
      shell: >
        AWS_ACCESS_KEY_ID="{{ aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY="{{ aws_secret_access_key }}"
        /usr/local/bin/aws s3 cp s3://{{ s3_bucket_name }}/{{ db2_tar }} {{ remote_staging_path }}/v11.5.8_linuxx64_server_dec.tar.gz
        --endpoint-url {{ aws_endpoint_url }}
      no_log: true 

    - name: 5. Copy Bundle Spec Zip using AWS CLI
      shell: >
        AWS_ACCESS_KEY_ID="{{ aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY="{{ aws_secret_access_key }}"
        /usr/local/bin/aws s3 cp s3://{{ s3_bucket_name }}/{{ spec_zip }} {{ remote_staging_path }}/IS_V11716.bundle_spec_file_mult.zip
        --endpoint-url {{ aws_endpoint_url }}
      no_log: true

    - name: 6. Ensure Home Directory Exists for itzuser
      file:
        path: "/home/itzuser"
        state: directory
        owner: itzuser
        group: itzuser
        mode: '0755'

    - name: 6.1. Copy Software RPMs to itzuser Home using AWS CLI
      shell: >
        AWS_ACCESS_KEY_ID="{{ aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY="{{ aws_secret_access_key }}"
        /usr/local/bin/aws s3 cp s3://{{ s3_bucket_name }}/{{ dm_software }}/ /home/itzuser/
        --recursive --exclude "*" --include "*.rpm"
        --endpoint-url {{ aws_endpoint_url }}
      no_log: true

    - name: 6.2. Set itzuser Ownership on Copied RPMs
      file:
        path: "/home/itzuser"
        owner: itzuser
        group: itzuser
        recurse: yes

    - name: 7. Extract Main Tarball via Native Shell
      ansible.builtin.shell: "tar -xzf IS_V11716_Linux_x86_multi.tar.gz"
      args:
        chdir: "{{ remote_staging_path }}"

    - name: 7.1. Extract Db2 Tarball into Isolated Folder
      ansible.builtin.shell: |
        mkdir -p db2_extracted
        tar -xzf v11.5.8_linuxx64_server_dec.tar.gz -C db2_extracted
      args:
        chdir: "{{ remote_staging_path }}"

    - name: 8. Ensure Target Directory for Bundle Spec Exists
      file:
        path: "{{ remote_staging_path }}/is-suite"
        state: directory
        owner: root
        group: dstage
        mode: '0777'

    - name: 9. Extract Bundle Spec Zip via Native Shell
      ansible.builtin.shell: "unzip -q IS_V11716.bundle_spec_file_mult.zip -d is-suite"
      args:
        chdir: "{{ remote_staging_path }}"

    - name: 10. Force Clean Recursive Ownership & Permissions for Installer
      file:
        path: "{{ remote_staging_path }}/is-suite"
        owner: root
        group: dstage
        mode: '0777'
        recurse: yes  

    - name: 11. Verify Critical Extraction Files are Present
      stat:
        path: "{{ remote_staging_path }}/is-suite/{{ item }}"
      loop:
        - setup
        - image.properties
      register: file_check

    - name: 12. Cleanup Downloaded Archives to Conserve Space
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ remote_staging_path }}/IS_V11716_Linux_x86_multi.tar.gz"
        - "{{ remote_staging_path }}/IS_V11716.bundle_spec_file_mult.zip"
        - "{{ remote_staging_path }}/v11.5.8_linuxx64_server_dec.tar.gz"